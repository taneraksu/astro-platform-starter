<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#0e1c2e"/>
      <stop offset="100%" stop-color="#050b12"/>
    </radialGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="400" height="180" fill="url(#bgGrad)" rx="0"/>

  <!-- Top thin rule -->
  <line x1="30" y1="28" x2="370" y2="28" stroke="#1e4d8a" stroke-width="0.7" opacity="0.5"/>

  <!-- Main text: "Op Dr Taner Aksu" in calligraphic style -->
  <!-- "Op Dr" — smaller, lighter weight -->
  <text x="30" y="78"
    font-family="Georgia, 'Palatino Linotype', Palatino, serif"
    font-style="italic"
    font-size="26"
    font-weight="normal"
    fill="#4a82c4"
    opacity="0.85"
    filter="url(#softGlow)"
    letter-spacing="3">Op Dr</text>

  <!-- "Taner Aksu" — large, dominant -->
  <text x="26" y="130"
    font-family="Georgia, 'Palatino Linotype', Palatino, serif"
    font-style="italic"
    font-size="56"
    font-weight="bold"
    fill="#5a9fd8"
    filter="url(#softGlow)"
    letter-spacing="-1">Taner Aksu</text>

  <!-- "Protez Takip" — subtitle, spaced -->
  <text x="32" y="158"
    font-family="Georgia, 'Palatino Linotype', Palatino, serif"
    font-style="normal"
    font-size="16"
    font-weight="normal"
    fill="#3a6fa8"
    opacity="0.75"
    letter-spacing="6">PROTEZ TAKİP</text>

  <!-- Bottom decorative flourish line -->
  <path d="M 28 165 Q 200 172 372 165" stroke="#1e4d8a" stroke-width="0.8" fill="none" opacity="0.6"/>
  <!-- Small accent dot at end -->
  <circle cx="372" cy="165" r="2.2" fill="#4a82c4" opacity="0.7"/>
</svg>
